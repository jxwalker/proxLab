# Add to your nginx config on 192.168.8.220
# Replace PROXLAB_LXC_IP with the actual IP of the proxlab LXC on beast

upstream proxlab_api {
    server PROXLAB_LXC_IP:8000;
}

upstream proxlab_web {
    server PROXLAB_LXC_IP:3000;
}

server {
    listen 80;
    server_name proxlab.local;

    # API backend
    location /api/ {
        proxy_pass http://proxlab_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # FastAPI interactive docs
    location /docs {
        proxy_pass http://proxlab_api/docs;
    }
    location /openapi.json {
        proxy_pass http://proxlab_api/openapi.json;
    }

    # React frontend (catch-all for SPA routing)
    location / {
        proxy_pass http://proxlab_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
